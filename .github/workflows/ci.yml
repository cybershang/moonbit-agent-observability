name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  check-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MoonBit toolchain
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: MoonBit version
        run: moon version --all

      - name: Install dependencies
        run: |
          moon update
          moon install

      - name: Check
        run: moon check

      - name: Format check
        run: |
          moon fmt
          git diff --exit-code

      - name: Info check
        run: |
          moon info
          git diff --exit-code

      - name: Check LLM_API_KEY secret
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [ -z "$LLM_API_KEY" ]; then
            echo "::error::LLM_API_KEY secret is not configured. Go to Settings → Secrets and variables → Actions → add LLM_API_KEY."
            exit 1
          fi
          echo "LLM_API_KEY is set ✓"

      - name: Test
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: moon test
